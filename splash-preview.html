<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Preview</title>
<style>
  body {
    margin: 0;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
  }
  .wrapper {
    text-align: center;
  }
  .phone {
    width: 375px;
    height: 667px;
    background: #ffffff;
    position: relative;
    border: 2px solid #333;
    margin: 0 auto 20px;
  }
  .logo-area {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 190px;
    border: 1px dashed #ccc;
  }
  .shape {
    position: absolute;
    background: #000;
  }
  .top-left {
    width: 85px;
    height: 75px;
    top: 7.5px;
    left: 32.6px;
    transform: skewX(28deg);
  }
  .top-right {
    width: 85px;
    height: 75px;
    top: 7.5px;
    right: 32.6px;
    transform: skewX(-28deg);
  }
  .bottom-left {
    width: 59px;
    height: 52px;
    bottom: 25px;
    left: 60px;
    transform: skewX(-28deg);
  }
  .bottom-right {
    width: 59px;
    height: 52px;
    bottom: 25px;
    right: 233.8px;
    transform: skewX(28deg);
  }
  .center-dot {
    width: 25px;
    height: 25px;
    background: #000;
    position: absolute;
    left: 137px;
    top: 82px;
  }
  .info {
    color: #333;
    font-size: 12px;
    line-height: 1.6;
    text-align: left;
    display: inline-block;
    background: #fff;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  .info code {
    background: #f5f5f5;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="phone">
    <div class="logo-area">
      <div class="shape top-left"></div>
      <div class="shape top-right"></div>
      <div class="shape bottom-left"></div>
      <div class="shape bottom-right"></div>
      <div class="center-dot"></div>
    </div>
  </div>
  <div class="info">
    <b>当前参数：</b><br>
    左上: <code>left:32.6</code>, <code>top:7.5</code> (85×75, skewX:28deg)<br>
    右上: <code>right:32.6</code>, <code>top:7.5</code> (85×75, skewX:-28deg)<br>
    左下: <code>left:65</code>, <code>bottom:25</code> (59×52, skewX:-28deg)<br>
    右下: <code>right:233.8</code>, <code>bottom:25</code> (59×52, skewX:28deg)<br>
    中心: <code>left:137</code>, <code>top:82</code> (25×25)
  </div>
</div>
</body>
</html>
