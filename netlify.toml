[build]
  command = "npx expo export --platform web"
  publish = "web-static"

[build.environment]
  NODE_VERSION = "20"
  EXPO_PUBLIC_BACKEND_BASE_URL = "https://word-voyage-api-production.up.railway.app"

# API 代理到后端
[[redirects]]
  from = "/api/*"
  to = "https://word-voyage-api-production.up.railway.app/api/:splat"
  status = 200
  force = true
  headers = {Cache-Control = "no-cache"}

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
